<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DeepSeek AI 聊天平台 | 支持Markdown+数学公式</title>
    <!-- 引入 marked.js 用于 Markdown 解析 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入 KaTeX 用于数学公式渲染 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <!-- 引入 highlight.js 用于代码高亮 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f0f2ff 0%, #e9eaff 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: #1e1e2f;
        }

        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* 左侧菜单栏 flex:3 */
        .sidebar {
            flex: 3;
            background: #2d2b55;
            border-right: 2px solid #1e1c3a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.05);
        }

        /* 右侧聊天区域 flex:17 */
        .chat-main {
            flex: 17;
            display: flex;
            flex-direction: column;
            background: #fefeff;
            height: 100%;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 14px 24px;
            background: #ffffffcc;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #e2e2f0;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            color: white;
            font-size: 26px;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
            transition: all 0.2s ease;
        }

        .new-chat-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #6d28d9, #4338ca);
        }

        .sidebar-header {
            padding: 20px 16px 10px 16px;
            font-weight: 700;
            font-size: 18px;
            color: #e0d9ff;
            border-bottom: 1px solid #44417a;
            margin-bottom: 12px;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 12px 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .conv-item {
            background: #3f3c72;
            border-radius: 16px;
            padding: 12px 12px 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .conv-item:hover {
            background: #514d8a;
            transform: translateX(3px);
        }

        .conv-name {
            font-weight: 500;
            color: #f1f1ff;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }

        .delete-conv {
            background: rgba(255, 90, 90, 0.2);
            border: none;
            color: #ffb4b4;
            font-size: 18px;
            width: 28px;
            height: 28px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-conv:hover {
            background: #ff5e5e;
            color: white;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fbfaff;
        }

        .message {
            display: flex;
            width: 100%;
        }

        .user-msg {
            justify-content: flex-end;
        }

        .assistant-msg {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .user-bubble {
            background: #4f46e5;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .assistant-bubble {
            background: #ffffff;
            color: #1e1e2f;
            border: 1px solid #e2e2f0;
            border-bottom-left-radius: 6px;
        }

        /* Markdown 内容样式 */
        .assistant-bubble h1, .assistant-bubble h2, .assistant-bubble h3 {
            margin: 12px 0 8px 0;
            font-weight: 600;
        }
        .assistant-bubble h1 { font-size: 1.5em; }
        .assistant-bubble h2 { font-size: 1.3em; }
        .assistant-bubble h3 { font-size: 1.1em; }
        .assistant-bubble p {
            margin: 8px 0;
        }
        .assistant-bubble ul, .assistant-bubble ol {
            margin: 8px 0;
            padding-left: 24px;
        }
        .assistant-bubble li {
            margin: 4px 0;
        }
        .assistant-bubble code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 6px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
        }
        .assistant-bubble pre {
            background: #1e1e2f;
            padding: 12px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 12px 0;
        }
        .assistant-bubble pre code {
            background: transparent;
            color: #e2e2f0;
            padding: 0;
        }
        .assistant-bubble blockquote {
            border-left: 4px solid #7c3aed;
            margin: 12px 0;
            padding-left: 16px;
            color: #6b7280;
        }
        .assistant-bubble a {
            color: #4f46e5;
            text-decoration: none;
        }
        .assistant-bubble a:hover {
            text-decoration: underline;
        }
        .assistant-bubble table {
            border-collapse: collapse;
            margin: 12px 0;
        }
        .assistant-bubble th, .assistant-bubble td {
            border: 1px solid #ddd;
            padding: 6px 12px;
        }
        .assistant-bubble th {
            background: #f3f4f6;
        }
        
        /* KaTeX 数学公式样式 */
        .assistant-bubble .katex {
            font-size: 1.1em;
        }
        .assistant-bubble .katex-display {
            margin: 12px 0;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .input-container {
            background: #ffffff;
            border-top: 1px solid #e9e9f0;
            padding: 16px 24px 20px 24px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9ff;
            border-radius: 32px;
            padding: 12px 18px;
            border: 1px solid #deddf5;
        }

        .message-input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 15px;
            outline: none;
            font-family: inherit;
            max-height: 150px;
            overflow-y: auto;
            color: #1f1f2e;
        }

        .message-input:empty:before {
            content: "输入消息...";
            color: #9ca3af;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 48px;
            background: linear-gradient(145deg, #4f46e5, #7c3aed);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-weight: bold;
            font-size: 16px;
            transition: 0.1s;
            box-shadow: 0 4px 8px rgba(79, 70, 229, 0.3);
        }

        .send-btn.stop-mode {
            background: #6c6f8f;
            box-shadow: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 460px;
            max-width: 90%;
            border-radius: 32px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: fadeInUp 0.2s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-body {
            padding: 28px 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-field label {
            font-weight: 600;
            color: #2d2b55;
            font-size: 14px;
        }

        .input-field input {
            padding: 12px 16px;
            border-radius: 28px;
            border: 1px solid #cfcdf2;
            font-size: 14px;
            outline: none;
        }

        .input-field input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 2px #c7d2fe;
        }

        .modal-footer {
            display: flex;
            justify-content: space-between;
            padding: 12px 28px 24px;
            gap: 16px;
        }

        .modal-btn {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }

        .modal-btn.confirm {
            background: #4f46e5;
            color: white;
        }

        .modal-btn.cancel {
            background: #eef2ff;
            color: #4b5563;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #b9b3e6;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 左侧菜单栏 -->
    <div class="sidebar">
        <div class="sidebar-header">📋 AI聊天记录</div>
        <div class="conversations-list" id="conversationsList"></div>
    </div>

    <!-- 右侧聊天主面板 -->
    <div class="chat-main">
        <div class="chat-header">
            <button class="new-chat-btn" id="newChatBtn">+</button>
        </div>
        <div class="messages-area" id="messagesArea">
            <div style="text-align: center; color: #aaa; margin-top: 30px;">✨ 选择一个对话或点击 + 开始聊天</div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <div contenteditable="true" id="messageInput" class="message-input" role="textbox"></div>
                <div class="toolbar">
                    <button id="sendBtn" class="send-btn">发送</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 配置 marked
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true
    });

    let conversations = [];
    let currentConvId = null;
    let isGenerating = false;
    let currentAbortController = null;
    let currentStreamingDiv = null;
    let streamingRawText = "";

    const conversationsListDiv = document.getElementById('conversationsList');
    const messagesArea = document.getElementById('messagesArea');
    const messageInputDiv = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');

    function saveToLocal() {
        const dataToStore = conversations.map(conv => ({
            id: conv.id,
            name: conv.name,
            apiKey: conv.apiKey,
            aiName: conv.aiName,
            messages: conv.messages
        }));
        localStorage.setItem('deepseek_chat_conversations', JSON.stringify(dataToStore));
        localStorage.setItem('currentConvId', currentConvId);
    }

    function loadFromLocal() {
        const stored = localStorage.getItem('deepseek_chat_conversations');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                conversations = parsed.map(c => ({
                    ...c,
                    deepThinkEnabled: false,
                    webSearchEnabled: false
                }));
            } catch(e) { conversations = []; }
        }
        const savedCurrentId = localStorage.getItem('currentConvId');
        if (savedCurrentId && conversations.some(c => c.id == savedCurrentId)) {
            currentConvId = savedCurrentId;
        } else if (conversations.length > 0) {
            currentConvId = conversations[0].id;
        } else {
            currentConvId = null;
        }
    }

    function createNewConversation(apiKey, aiName) {
        if (!apiKey || apiKey.trim() === "") {
            alert("请输入有效的DeepSeek API密钥");
            return null;
        }
        if (!aiName || aiName.trim() === "") aiName = "未命名AI";
        const newId = Date.now().toString();
        const newConv = {
            id: newId,
            name: aiName.length > 12 ? aiName.slice(0,10)+".." : aiName,
            apiKey: apiKey.trim(),
            aiName: aiName.trim(),
            messages: []
        };
        conversations.push(newConv);
        currentConvId = newId;
        saveToLocal();
        renderSidebar();
        renderCurrentChat();
        return newConv;
    }

    function renderSidebar() {
        conversationsListDiv.innerHTML = '';
        if (conversations.length === 0) {
            const emptyDiv = document.createElement('div');
            emptyDiv.style.color = '#b9b3e6';
            emptyDiv.style.padding = '20px';
            emptyDiv.style.textAlign = 'center';
            emptyDiv.innerText = '暂无对话，点击 + 创建';
            conversationsListDiv.appendChild(emptyDiv);
            return;
        }
        conversations.forEach(conv => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'conv-item';
            const nameSpan = document.createElement('span');
            nameSpan.className = 'conv-name';
            nameSpan.innerText = conv.name;
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-conv';
            delBtn.innerHTML = '✕';
            delBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteConversation(conv.id);
            });
            itemDiv.appendChild(nameSpan);
            itemDiv.appendChild(delBtn);
            itemDiv.addEventListener('click', () => {
                if (currentConvId !== conv.id) {
                    currentConvId = conv.id;
                    saveToLocal();
                    renderCurrentChat();
                    renderSidebar();
                }
            });
            if (currentConvId === conv.id) {
                itemDiv.style.background = '#6c63c9';
            } else {
                itemDiv.style.background = '#3f3c72';
            }
            conversationsListDiv.appendChild(itemDiv);
        });
    }

    function deleteConversation(id) {
        const index = conversations.findIndex(c => c.id === id);
        if (index !== -1) {
            conversations.splice(index, 1);
            if (currentConvId === id) {
                currentConvId = conversations.length > 0 ? conversations[0].id : null;
            }
            saveToLocal();
            renderSidebar();
            renderCurrentChat();
        }
    }

    function getCurrentConversation() {
        if (!currentConvId) return null;
        return conversations.find(c => c.id === currentConvId) || null;
    }

    // 渲染 Markdown 内容到气泡，支持数学公式
    function renderMarkdownToElement(element, markdownText) {
        if (!markdownText) {
            element.innerHTML = '';
            return;
        }
        try {
            const html = marked.parse(markdownText);
            element.innerHTML = html;
            
            // 高亮代码块
            element.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            // 渲染数学公式（KaTeX）
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(element, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            }
        } catch(e) {
            console.warn('Markdown解析失败:', e);
            element.innerText = markdownText;
        }
    }

    function renderCurrentChat() {
        const conv = getCurrentConversation();
        messagesArea.innerHTML = '';
        if (!conv) {
            messagesArea.innerHTML = '<div style="text-align: center; color: #aaa; margin-top: 30px;">👈 请点击左侧对话 或 + 新建AI聊天</div>';
            return;
        }
        
        if (conv.messages.length === 0) {
            const welcome = document.createElement('div');
            welcome.style.textAlign = 'center';
            welcome.style.color = '#8f8cb0';
            welcome.style.marginTop = '30px';
            welcome.innerHTML = `💬 与 ${conv.aiName} 的对话开始啦！<br><br>支持 Markdown、数学公式 (<code>$E=mc^2$</code>)、希腊字母 (αβγδ)`;
            messagesArea.appendChild(welcome);
        } else {
            conv.messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.role === 'user' ? 'user-msg' : 'assistant-msg'}`;
                const bubble = document.createElement('div');
                bubble.className = `bubble ${msg.role === 'user' ? 'user-bubble' : 'assistant-bubble'}`;
                
                if (msg.role === 'user') {
                    bubble.innerText = msg.content;
                } else {
                    renderMarkdownToElement(bubble, msg.content);
                }
                msgDiv.appendChild(bubble);
                messagesArea.appendChild(msgDiv);
            });
        }
        scrollToBottom();
    }

    function scrollToBottom() {
        setTimeout(() => {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }, 50);
    }

    async function callDeepSeekAPI(userMessage) {
        const conv = getCurrentConversation();
        if (!conv) { alert("请先创建或选择一个对话"); return; }
        if (!conv.apiKey) { alert("当前对话未配置API密钥"); return; }

        if (isGenerating) {
            if (currentAbortController) {
                currentAbortController.abort();
            }
            return;
        }

        const messagesHistory = conv.messages.map(m => ({ role: m.role, content: m.content }));
        messagesHistory.push({ role: "user", content: userMessage });
        
        conv.messages.push({ role: "user", content: userMessage });
        saveToLocal();
        renderCurrentChat();
        
        const assistantPlaceholderIndex = conv.messages.length;
        conv.messages.push({ role: "assistant", content: "", tempFlag: true });
        saveToLocal();
        renderCurrentChat();

        const msgDivs = messagesArea.querySelectorAll('.message');
        let lastAssistantDiv = null;
        for (let i = msgDivs.length-1; i>=0; i--) {
            if (msgDivs[i].classList.contains('assistant-msg')) {
                lastAssistantDiv = msgDivs[i];
                break;
            }
        }
        const bubbleDiv = lastAssistantDiv?.querySelector('.bubble');
        streamingRawText = "";
        currentStreamingDiv = bubbleDiv;
        
        isGenerating = true;
        sendBtn.innerHTML = "■";
        sendBtn.classList.add('stop-mode');
        
        let requestBody = {
            model: "deepseek-chat",
            messages: messagesHistory,
            stream: true,
            temperature: 0.7
        };
        
        currentAbortController = new AbortController();
        try {
            const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${conv.apiKey}`
                },
                body: JSON.stringify(requestBody),
                signal: currentAbortController.signal
            });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`API错误 ${response.status}: ${errText}`);
            }
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let fullContent = "";
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const chunk = decoder.decode(value);
                const lines = chunk.split("\n");
                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const dataStr = line.slice(6);
                        if (dataStr === "[DONE]") continue;
                        try {
                            const json = JSON.parse(dataStr);
                            const delta = json.choices[0]?.delta?.content || "";
                            if (delta) {
                                fullContent += delta;
                                streamingRawText = fullContent;
                                if (currentStreamingDiv) {
                                    renderMarkdownToElement(currentStreamingDiv, streamingRawText);
                                    scrollToBottom();
                                }
                            }
                        } catch (e) { }
                    }
                }
            }
            const targetConv = getCurrentConversation();
            if (targetConv && targetConv.messages[assistantPlaceholderIndex]) {
                targetConv.messages[assistantPlaceholderIndex].content = fullContent;
                delete targetConv.messages[assistantPlaceholderIndex].tempFlag;
                saveToLocal();
                renderCurrentChat();
            }
        } catch (err) {
            if (err.name === 'AbortError') {
                const targetConv2 = getCurrentConversation();
                if (targetConv2 && targetConv2.messages[assistantPlaceholderIndex]) {
                    targetConv2.messages[assistantPlaceholderIndex].content = streamingRawText || "(已停止)";
                    delete targetConv2.messages[assistantPlaceholderIndex].tempFlag;
                    saveToLocal();
                    renderCurrentChat();
                }
            } else {
                alert("请求失败: " + err.message);
                const targetConv3 = getCurrentConversation();
                if (targetConv3 && targetConv3.messages[assistantPlaceholderIndex]) {
                    targetConv3.messages[assistantPlaceholderIndex].content = `错误: ${err.message}`;
                    delete targetConv3.messages[assistantPlaceholderIndex].tempFlag;
                    saveToLocal();
                    renderCurrentChat();
                }
            }
        } finally {
            isGenerating = false;
            currentAbortController = null;
            sendBtn.innerHTML = "发送";
            sendBtn.classList.remove('stop-mode');
            streamingRawText = "";
            currentStreamingDiv = null;
        }
    }
    
    async function handleSend() {
        const conv = getCurrentConversation();
        if (!conv) {
            alert("请先创建对话（点击右上角+并填写API密钥和AI名称）");
            return;
        }
        if (isGenerating) {
            if (currentAbortController) {
                currentAbortController.abort();
            }
            return;
        }
        let text = messageInputDiv.innerText.trim();
        if (!text) return;
        messageInputDiv.innerText = '';
        messageInputDiv.blur();
        await callDeepSeekAPI(text);
    }
    
    function showNewModal() {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal-content">
                <div class="modal-body">
                    <div class="input-field">
                        <label>请输入API密钥：</label>
                        <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
                    </div>
                    <div class="input-field">
                        <label>请输入AI名称：</label>
                        <input type="text" id="aiNameInput" placeholder="例如: DeepSeek助手">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="modal-btn cancel" id="cancelModalBtn">取消</button>
                    <button class="modal-btn confirm" id="confirmModalBtn">确定</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        const apiInput = overlay.querySelector('#apiKeyInput');
        const nameInput = overlay.querySelector('#aiNameInput');
        const confirmBtn = overlay.querySelector('#confirmModalBtn');
        const cancelBtn = overlay.querySelector('#cancelModalBtn');
        const closeModal = () => overlay.remove();
        confirmBtn.onclick = () => {
            const apiKey = apiInput.value.trim();
            const aiName = nameInput.value.trim() || "新AI模型";
            if (!apiKey) { alert("API密钥不能为空"); return; }
            createNewConversation(apiKey, aiName);
            closeModal();
        };
        cancelBtn.onclick = closeModal;
        overlay.onclick = (e) => { if(e.target === overlay) closeModal(); };
    }
    
    sendBtn.addEventListener('click', handleSend);
    newChatBtn.addEventListener('click', showNewModal);
    messageInputDiv.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            handleSend();
        }
    });
    
    loadFromLocal();
    renderSidebar();
    renderCurrentChat();
</script>
</body>
</html>
